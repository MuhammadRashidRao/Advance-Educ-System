{% extends 'base.html' %}

{% block title %}Password Reset Complete - Education System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5 text-center">
                        <i class="fas fa-check-circle text-success display-4 mb-4"></i>
                        <h2 class="mb-3">Password Reset Complete</h2>
                        <p class="text-muted mb-4">
                            Your password has been set successfully. 
                            You may now log in with your new password.
                        </p>
                        
                        <div class="alert alert-success">
                            <i class="fas fa-info-circle"></i>
                            <strong>Success!</strong> Your password has been updated.
                        </div>

                        <hr class="my-4">

                        <a href="{% url 'authentication:login' %}" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Sign In Now
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
